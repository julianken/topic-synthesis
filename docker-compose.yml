# Local dev infrastructure for topic-synthesis.
#
# Postgres is the app's system-of-record (it also holds workflow step_results for the durable
# GcpEngine). Redis is currently VESTIGIAL — it backed the now-dropped Trigger.dev engine;
# removal is tracked in GAPS.md (see docs/decisions/0001).
#
#   docker compose up -d        # start Postgres + Redis
#   npm run db:migrate          # apply src/store/schema.sql
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-topic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topic_dev}
      POSTGRES_DB: ${POSTGRES_DB:-topic_synthesis}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topic} -d ${POSTGRES_DB:-topic_synthesis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
